services:
  - type: web
    name: lguss-api-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: AES_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://lguss-barangay.vercel.app
